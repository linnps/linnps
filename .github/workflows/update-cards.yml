name: Update profile cards

on:
  schedule:
    - cron: "0 6 * * *"     # daily at 06:00 UTC
  workflow_dispatch: {}     # manual trigger from the Actions tab
  push:
    paths:
      - "scripts/generate_cards.py"
      - ".github/workflows/update-cards.yml"

permissions:
  contents: write             # commit regenerated SVGs back to the repo

concurrency:
  group: update-cards
  cancel-in-progress: false   # don't cancel a half-finished daily run

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate cards
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: python scripts/generate_cards.py

      - name: Commit refreshed SVGs (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/cards/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(cards): refresh profile cards [skip ci]"
            git push
          fi
